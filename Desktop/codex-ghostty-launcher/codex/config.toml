model = "gpt-5.4"
model_reasoning_effort = "medium"
model_verbosity = "low"
model_reasoning_summary = "concise"
tool_output_token_limit = 8000

# Keep a much larger safety margin so Codex can compact before quality drops.
# Formula: 258000 - (tool_output_token_limit + 90000)
# With tool_output_token_limit=8000 => 258000 - (8000 + 90000) = 160000
model_auto_compact_token_limit = 160000
personality = "pragmatic"

[features]
ghost_commit = false
unified_exec = true
apply_patch_freeform = true
web_search_request = true
skills = true
shell_snapshot = true

[projects."/Users/bensuo/Desktop/codex-ghostty-launcher"]
trust_level = "trusted"
